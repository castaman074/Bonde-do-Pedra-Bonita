<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; }

.card {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

.select-group { margin-bottom: 10px; }

.label {
  background: #e6f0ff;
  color: #000;
  font-weight: bold;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 4px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-main { background: #007aff; }
.btn-whats { background: #25d366; }
.btn-entrar { background: #007aff; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  cursor: pointer;
}

.kid.active {
  background: #007aff;
  color: white;
}

.car {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<div class="select-group">
  <div class="label">Família</div>
  <select id="motorista"></select>
</div>

<div class="select-group">
  <div class="label">Dia</div>
  <select id="dia"></select>
</div>

<div class="select-group">
  <div class="label">Trajeto</div>
  <select id="tipo"></select>
</div>

<div class="select-group">
  <div class="label">Origem/Destino</div>
  <select id="destino"></select>
</div>

<button class="btn-main" onclick="confirmarCarona()">✅ Confirmar carona</button>

<div class="kids" id="kids"></div>

<button class="btn-whats" onclick="enviarWhats()">📤 Avisar no WhatsApp</button>

</div>

<div class="card">
  <div id="lista">Nenhuma carona ainda</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzv45aDvmAMqew1hyvBb6BhyL9aA3rvn_7rmxGyBCHQYBEpQhij4iyHnoEUMrEkjhIjkw/exec";

let selecionados = [];

const ordemDias = ["Segunda","Terça","Quarta","Quinta","Sexta"];
const motoristas = ["Carmen/João","Denise/Telmo","Karina/Jéferson","Natália/Pedro","Vanessa/Cris"];

document.getElementById("motorista").innerHTML = motoristas.map(m=>`<option>${m}</option>`).join("");
document.getElementById("dia").innerHTML = ordemDias.map(d=>`<option>${d}</option>`).join("");
document.getElementById("tipo").innerHTML = `<option value="Levar">Ida</option><option value="Buscar">Volta</option>`;
document.getElementById("destino").innerHTML = `<option>Escola</option><option>Futsal</option>`;

const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];
const kidsDiv = document.getElementById("kids");

kidsLista.forEach(kid=>{
  const div=document.createElement("div");
  div.className="kid";
  div.innerText=kid;

  div.onclick=()=>{
    if(selecionados.includes(kid)){
      selecionados=selecionados.filter(k=>k!==kid);
      div.classList.remove("active");
    } else {
      selecionados.push(kid);
      div.classList.add("active");
    }
  };

  kidsDiv.appendChild(div);
});

function confirmarCarona(){
  const motorista = document.getElementById("motorista").value;
  const dia = document.getElementById("dia").value;
  const tipo = document.getElementById("tipo").value;
  const destino = document.getElementById("destino").value;

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({motorista,dia,tipo,destino,kids:[]})
  }).then(()=>{
    alert("Carona confirmada! 🚐");
    carregar();
  });
}

function entrarNaCarona(c){
  if(selecionados.length===0){
    alert("Seleciona criança");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({...c, kids:selecionados})
  }).then(()=>{
    selecionados=[];
    document.querySelectorAll(".kid").forEach(k=>k.classList.remove("active"));
    carregar();
  });
}

function formatarData(diaSemana){
  const hoje = new Date();
  const hojeIndex = hoje.getDay() - 1;

  let target = ordemDias.indexOf(diaSemana);
  let diff = target - hojeIndex;

  if(diff < 0) diff += 7;

  const data = new Date();
  data.setDate(hoje.getDate() + diff);

  const d = String(data.getDate()).padStart(2,"0");
  const m = String(data.getMonth()+1).padStart(2,"0");

  return `${diaSemana.slice(0,3)}, ${d}/${m}`;
}

// 🔥 RESET AUTOMÁTICO DIÁRIO
function checarReset(){
  const hoje = new Date().toDateString();
  const ultimo = localStorage.getItem("ultimoUso");

  if(ultimo !== hoje){
    localStorage.setItem("ultimoUso", hoje);

    fetch(URL,{
      method:"POST",
      body:JSON.stringify({reset:true})
    }).then(()=>carregar());
  }
}

function carregar(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    const lista=document.getElementById("lista");
    lista.innerHTML="";

    let grupos={};

    data.forEach(l=>{
      if(!l[0]) return;

      const key=l[0]+l[1]+l[2]+l[3];

      if(!grupos[key]){
        grupos[key]={dia:l[0],destino:l[1],motorista:l[2],tipo:l[3],kids:[]};
      }

      if(l[4]){
        l[4].split(", ").forEach(k=>{
          if(!grupos[key].kids.includes(k)){
            grupos[key].kids.push(k);
          }
        });
      }
    });

    const ordenado = Object.values(grupos).sort((a,b)=>{
      return ordemDias.indexOf(a.dia) - ordemDias.indexOf(b.dia);
    });

    ordenado.forEach(c=>{
      const dataFormatada = formatarData(c.dia);

      let html=`<div class="car">
      <strong>${dataFormatada} - ${c.destino} (${c.tipo})</strong><br>
      ${c.motorista}<br>`;

      c.kids.forEach(k=> html+=`→ ${k}<br>`);

      html+=`<button class="btn-entrar" onclick='entrarNaCarona(${JSON.stringify(c)})'>Entrar nessa carona</button>`;
      html+="</div>";

      lista.innerHTML+=html;
    });

    if(!lista.innerHTML) lista.innerHTML="Nenhuma carona ainda";
  });
}

function enviarWhats(){
  const lista=document.getElementById("lista").innerText;

  if(lista.includes("Nenhuma")){
    alert("Nada pra enviar");
    return;
  }

  window.open("https://wa.me/?text="+encodeURIComponent(lista));
}

// roda ao abrir
checarReset();
carregar();
</script>

</body>
</html>
