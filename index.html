<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f7;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; }

.card {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #007aff;
  color: white;
  font-weight: bold;
}

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  cursor: pointer;
}

.kid.active {
  background: #34c759;
  color: white;
}

.car {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
}
</style>
</head>

<body>

<h1>🚐 Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista">
  <option>Carmen/João</option>
  <option>Denise/Telmo</option>
  <option>Karina/Jéferson</option>
  <option>Natália/Pedro</option>
  <option>Vanessa/Cris</option>
</select>

<select id="dia">
  <option>Segunda</option>
  <option>Terça</option>
  <option>Quarta</option>
  <option>Quinta</option>
  <option>Sexta</option>
</select>

<select id="tipo">
  <option value="Levar">Ida</option>
  <option value="Buscar">Volta</option>
</select>

<select id="destino">
  <option value="Escola">Escola</option>
  <option value="Futsal">Futsal</option>
</select>

<button onclick="criarCarona()">🚐 Tenho vaga</button>

<div class="kids" id="kids"></div>
<button onclick="entrarCarona()">➕ Entrar na carona</button>

</div>

<div class="card">
  <div id="lista"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxxDm-4-LKJxB2Xm3CmKmEASqLPz191zdK-ExBGAhtJp2RRpn1e6XpJY6seCnED1x99eA/exec";

const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];
let selecionados = [];

const kidsDiv = document.getElementById("kids");

kidsLista.forEach(kid => {
  const div = document.createElement("div");
  div.className = "kid";
  div.innerText = kid;

  div.onclick = () => {
    if (selecionados.includes(kid)) {
      selecionados = selecionados.filter(k => k !== kid);
      div.classList.remove("active");
    } else {
      selecionados.push(kid);
      div.classList.add("active");
    }
  };

  kidsDiv.appendChild(div);
});

function criarCarona() {
  const motorista = document.getElementById("motorista").value;
  const dia = document.getElementById("dia").value;
  const tipo = document.getElementById("tipo").value;
  const destino = document.getElementById("destino").value;

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      motorista,
      dia,
      tipo,
      destino,
      kids: []
    })
  }).then(carregar);
}

function entrarCarona() {
  const motorista = document.getElementById("motorista").value;
  const dia = document.getElementById("dia").value;
  const tipo = document.getElementById("tipo").value;
  const destino = document.getElementById("destino").value;

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      motorista,
      dia,
      tipo,
      destino,
      kids: selecionados
    })
  }).then(() => {
    selecionados = [];
    document.querySelectorAll(".kid").forEach(k => k.classList.remove("active"));
    carregar();
  });
}

function formatarData(diaSemana) {
  const dias = ["Segunda","Terça","Quarta","Quinta","Sexta"];
  const hoje = new Date();
  const hojeIndex = hoje.getDay() - 1;

  let target = dias.indexOf(diaSemana);
  let diff = target - hojeIndex;

  if (diff < 0) diff += 7;

  const data = new Date();
  data.setDate(hoje.getDate() + diff);

  const d = String(data.getDate()).padStart(2,"0");
  const m = String(data.getMonth()+1).padStart(2,"0");

  return `${diaSemana.slice(0,3)}, ${d}/${m}`;
}

function carregar() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      let grupos = {};

      data.forEach(l => {
        if (!l[0]) return;

        const key = l[0] + l[1] + l[2] + l[3];

        if (!grupos[key]) {
          grupos[key] = {
            dia: l[0],
            destino: l[1],
            motorista: l[2],
            tipo: l[3],
            kids: []
          };
        }

        if (l[4]) {
          l[4].split(", ").forEach(k => {
            if (!grupos[key].kids.includes(k)) {
              grupos[key].kids.push(k);
            }
          });
        }
      });

      Object.values(grupos).forEach(c => {
        const dataFormatada = formatarData(c.dia);

        let html = `<div class="car">
          <strong>🚐 ${dataFormatada} - ${c.destino} (${c.tipo})</strong><br>
          ${c.motorista}<br>`;

        c.kids.forEach(k => {
          html += `→ ${k}<br>`;
        });

        html += "</div>";

        lista.innerHTML += html;
      });

    });
}

carregar();
</script>

</body>
</html>
