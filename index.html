<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #1c1c1e;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  color: white;
}

.card {
  background: #2c2c2e;
  color: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #3a3a3c;
  color: white;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-main { background: #007aff; }
.btn-whats { background: #25d366; }
.btn-entrar { background: #007aff; }
.btn-sair { background: #ff3b30; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  background: #3a3a3c;
  text-align: center;
  cursor: pointer;
}

.kid.active {
  background: #007aff;
}

.car {
  border-bottom: 1px solid #444;
  padding: 10px 0;
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.hora18 { color: #5ac8fa; font-weight: bold; }
.hora19 { color: #007aff; font-weight: bold; }
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista">
  <option value="" disabled selected>Selecione a família</option>
</select>

<select id="dia">
  <option value="" disabled selected>Selecione o dia</option>
</select>

<select id="destino" onchange="toggleHorario()">
  <option value="" disabled selected>Origem/Destino</option>
  <option>Escola</option>
  <option>Futsal</option>
</select>

<select id="tipo" onchange="toggleHorario()">
  <option value="" disabled selected>Trajeto</option>
  <option value="Levar">Ida</option>
  <option value="Buscar">Volta</option>
</select>

<div id="horarioContainer" style="display:none;">
  <select id="horario">
    <option value="" disabled selected>Horário</option>
    <option>18h</option>
    <option>19h</option>
  </select>
</div>

<button class="btn-main" onclick="confirmarCarona()">✅ Confirmar carona</button>

<div style="margin-top:10px; font-weight:bold; color:#aaa;">
  Selecione os piás abaixo:
</div>

<div class="kids" id="kids"></div>

<button class="btn-whats" onclick="enviarWhats()">📤 Avisar no WhatsApp</button>

</div>

<div class="card">
  <div class="section-title">📚 Escola</div>
  <div id="escola"></div>
</div>

<div class="card">
  <div class="section-title">⚽ Futsal</div>
  <div id="futsal"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx8mQrUXJrvj8HfcaKEBjZ6c48D4eNockXxpNO6gxQ7R5Xr_MWhfkGokQpMzM-6IC4wYg/exec";

let selecionados = [];

const motoristas = ["Carmen/João","Denise/Telmo","Karina/Jéferson","Natália/Pedro","Vanessa/Cris"];
const dias = ["Segunda","Terça","Quarta","Quinta","Sexta"];

document.getElementById("motorista").innerHTML += motoristas.map(m=>`<option>${m}</option>`).join("");
document.getElementById("dia").innerHTML += dias.map(d=>`<option>${d}</option>`).join("");

function toggleHorario(){
  const destino = document.getElementById("destino").value;
  const tipo = document.getElementById("tipo").value;
  const mostrar = destino === "Escola" && tipo === "Buscar";

  const container = document.getElementById("horarioContainer");
  const horario = document.getElementById("horario");

  container.style.display = mostrar ? "block" : "none";

  if (!mostrar) {
    horario.value = "";
  }
}

const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];
const kidsDiv = document.getElementById("kids");

kidsLista.forEach(kid=>{
  const div=document.createElement("div");
  div.className="kid";
  div.innerText=kid;

  div.onclick=()=>{
    if(selecionados.includes(kid)){
      selecionados=selecionados.filter(k=>k!==kid);
      div.classList.remove("active");
    } else {
      selecionados.push(kid);
      div.classList.add("active");
    }
  };

  kidsDiv.appendChild(div);
});

function confirmarCarona(){
  const motorista = document.getElementById("motorista").value;
  const dia = document.getElementById("dia").value;
  const tipo = document.getElementById("tipo").value;
  const destino = document.getElementById("destino").value;
  const horario = document.getElementById("horario").value;

  if (!motorista || !dia || !tipo || !destino) {
    alert("Preenche tudo antes de confirmar 👀");
    return;
  }

  if (destino === "Escola" && tipo === "Buscar" && !horario) {
    alert("Seleciona o horário 👀");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({motorista,dia,tipo,destino,horario,kids:[]})
  }).then(()=>carregar());
}

function entrarNaCarona(c){
  if(selecionados.length===0){
    alert("Seleciona criança");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({...c, kids:selecionados})
  }).then(()=>{
    selecionados=[];
    document.querySelectorAll(".kid").forEach(k => k.classList.remove("active"));
    carregar();
  });
}

function sairDaCarona(c, nome){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({...c, kids:[nome], remover:true})
  }).then(()=>carregar());
}

function carregar(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    const escola=document.getElementById("escola");
    const futsal=document.getElementById("futsal");

    escola.innerHTML="";
    futsal.innerHTML="";

    data.reverse().forEach(l=>{
      if(!l[0]) return;

      const horaClass = l[5] === "18h" ? "hora18" : "hora19";

      let html=`<div class="car">
      <strong>${l[0]} ${l[5] ? "- " : ""}<span class="${horaClass}">${l[5] || ""}</span> - ${l[1]} (${l[3]})</strong><br>
      ${l[2]}<br>`;

      if(l[4]){
        l[4].split(", ").forEach(k=>{
          html+=`→ ${k} <button class="btn-sair" onclick='sairDaCarona(${JSON.stringify(l)}, "${k}")'>Sair</button><br>`;
        });
      }

      html+=`<button class="btn-entrar" onclick='entrarNaCarona(${JSON.stringify(l)})'>Entrar nessa carona</button>`;
      html+="</div>";

      if(l[1]==="Escola") escola.innerHTML+=html;
      else futsal.innerHTML+=html;
    });

    if(!escola.innerHTML) escola.innerHTML="Nenhuma carona";
    if(!futsal.innerHTML) futsal.innerHTML="Nenhuma carona";
  });
}

function enviarWhats(){
  let texto = "🚐 Barcas do Pedra Bonita\n\n";

  const escola = document.getElementById("escola").innerText.trim();
  const futsal = document.getElementById("futsal").innerText.trim();

  if (escola && !escola.includes("Nenhuma")) {
    texto += "📚 Escola:\n" + escola + "\n\n";
  }

  if (futsal && !futsal.includes("Nenhuma")) {
    texto += "⚽ Futsal:\n" + futsal + "\n\n";
  }

  if (texto === "🚐 Barcas do Pedra Bonita\n\n") {
    alert("Nada pra enviar");
    return;
  }

  window.open("https://wa.me/?text=" + encodeURIComponent(texto));
}

carregar();
</script>

</body>
</html>
