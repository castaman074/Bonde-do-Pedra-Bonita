<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #1c1c1e;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; color: white; }

.card {
  background: #2c2c2e;
  color: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #3a3a3c;
  color: white;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-main { background: #007aff; }
.btn-whats { background: #25d366; }
.btn-entrar { background: #34c759; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  background: #3a3a3c;
  text-align: center;
  cursor: pointer;
}

.kid.active { background: #007aff; }

.label-pias {
  background: #ff9f0a;
  color: black;
  font-weight: bold;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  margin: 10px 0;
}

.car {
  border-bottom: 1px solid #444;
  padding: 10px 0;
}

.hora18 { color: #5ac8fa; }
.hora19 { color: #007aff; }
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista">
<option disabled selected>Selecione a família</option>
<option>Carmen/João</option>
<option>Denise/Telmo</option>
<option>Karina/Jéferson</option>
<option>Natália/Pedro</option>
<option>Vanessa/Cris</option>
</select>

<select id="dia">
<option disabled selected>Selecione o dia</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>

<select id="destino" onchange="toggleHorario()">
<option disabled selected>Origem/Destino</option>
<option>Escola</option>
<option>Futsal</option>
</select>

<select id="tipo" onchange="toggleHorario()">
<option disabled selected>Trajeto</option>
<option value="Levar">Ida</option>
<option value="Buscar">Volta</option>
</select>

<div id="horarioContainer" style="display:none;">
<select id="horario">
<option disabled selected>Horário</option>
<option>18h</option>
<option>19h</option>
</select>
</div>

<div class="label-pias">Selecione os piás abaixo</div>
<div class="kids" id="kids"></div>

<button class="btn-main" onclick="confirmar()">✅ Confirmar carona</button>
<button class="btn-whats" onclick="whats()">📤 Avisar no WhatsApp</button>

</div>

<div class="card">
<b>📚 Escola</b>
<div id="escola"></div>
</div>

<div class="card">
<b>⚽ Futsal</b>
<div id="futsal"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzZeQKg_1NaJSWvNye7iHCtcRsZWdwd5fJVvfufT7WB0FZ6PAGzaVh4rQmR8VUW9SwgQg/exec";
let selecionados=[];

function toggleHorario(){
  horarioContainer.style.display =
    (destino.value==="Escola" && tipo.value==="Buscar")?"block":"none";
}

["José","João","Joaquim","Beni","Bento","Finkler"].forEach(k=>{
  const d=document.createElement("div");
  d.className="kid";
  d.innerText=k;
  d.onclick=()=>{
    if(selecionados.includes(k)){
      selecionados=selecionados.filter(x=>x!==k);
      d.classList.remove("active");
    } else {
      selecionados.push(k);
      d.classList.add("active");
    }
  };
  kids.appendChild(d);
});

function confirmar(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      motorista:motorista.value,
      dia:dia.value,
      tipo:tipo.value,
      destino:destino.value,
      horario:horario.value,
      kids:[]
    })
  }).then(()=>setTimeout(load,600));
}

function entrar(l){
  if(!selecionados.length){alert("Seleciona alguém");return;}
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      dia:l[0],destino:l[1],motorista:l[2],
      tipo:l[3],horario:l[5],kids:selecionados
    })
  }).then(()=>{
    selecionados=[];
    document.querySelectorAll(".kid").forEach(k=>k.classList.remove("active"));
    setTimeout(load,600);
  });
}

function load(){
  fetch(URL).then(r=>r.json()).then(data=>{
    escola.innerHTML=""; futsal.innerHTML="";
    data.slice().reverse().forEach(l=>{
      if(!l[0])return;

      let html=`
      <div class="car">
      <b>${l[0]} - <span class="${l[5]=='18h'?'hora18':'hora19'}">${l[5]}</span> - ${l[1]} (${l[3]})</b><br>
      ${l[2]}<br>
      ${l[4]?l[4].split(", ").map(k=>"→ "+k).join("<br>"):"<i>Nenhuma criança ainda</i>"}<br>
      <button class="btn-entrar" onclick='entrar(${JSON.stringify(l)})'>Entrar nessa carona</button>
      </div>`;

      (l[1]=="Escola"?escola:futsal).innerHTML+=html;
    });
  });
}

function whats(){
  let t="🚐 Barcas do Pedra Bonita\n\n";
  document.querySelectorAll(".car").forEach(c=>t+=c.innerText+"\n\n");
  window.open("https://wa.me/?text="+encodeURIComponent(t));
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

load();
</script>

</body>
</html>
