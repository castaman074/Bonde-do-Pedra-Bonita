<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #1c1c1e;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; color: white; }

.card {
  background: #2c2c2e;
  color: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #3a3a3c;
  color: white;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-main { background: #007aff; }
.btn-whats { background: #25d366; }
.btn-entrar { background: #34c759; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  background: #3a3a3c;
  text-align: center;
  cursor: pointer;
}

.kid.active { background: #007aff; }

.car {
  border-bottom: 1px solid #444;
  padding: 10px 0;
}

.label-pias {
  background: #ff9f0a;
  color: black;
  font-weight: bold;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  margin: 10px 0;
}

.hora18 { color: #5ac8fa; font-weight: bold; }
.hora19 { color: #007aff; font-weight: bold; }
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista"></select>
<select id="dia"></select>
<select id="destino" onchange="toggleHorario()">
  <option disabled selected>Origem/Destino</option>
  <option>Escola</option>
  <option>Futsal</option>
</select>

<select id="tipo" onchange="toggleHorario()">
  <option disabled selected>Trajeto</option>
  <option value="Levar">Ida</option>
  <option value="Buscar">Volta</option>
</select>

<div id="horarioContainer" style="display:none;">
  <select id="horario">
    <option disabled selected>Horário</option>
    <option>18h</option>
    <option>19h</option>
  </select>
</div>

<div class="label-pias">Selecione os piás abaixo</div>

<div class="kids" id="kids"></div>

<button class="btn-main" onclick="confirmarCarona()">✅ Confirmar carona</button>
<button class="btn-whats" onclick="enviarWhats()">📤 Avisar no WhatsApp</button>

</div>

<div class="card">
  <b>📚 Escola</b>
  <div id="escola"></div>
</div>

<div class="card">
  <b>⚽ Futsal</b>
  <div id="futsal"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzZeQKg_1NaJSWvNye7iHCtcRsZWdwd5fJVvfufT7WB0FZ6PAGzaVh4rQmR8VUW9SwgQg/exec";

let selecionados = [];

const motoristas = ["Carmen/João","Denise/Telmo","Karina/Jéferson","Natália/Pedro","Vanessa/Cris"];
const dias = ["Segunda","Terça","Quarta","Quinta","Sexta"];

motoristas.forEach(m=>{
  document.getElementById("motorista").innerHTML += `<option>${m}</option>`;
});

dias.forEach(d=>{
  document.getElementById("dia").innerHTML += `<option>${d}</option>`;
});

function toggleHorario(){
  const destino = document.getElementById("destino").value;
  const tipo = document.getElementById("tipo").value;

  document.getElementById("horarioContainer").style.display =
    (destino === "Escola" && tipo === "Buscar") ? "block" : "none";
}

const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];

kidsLista.forEach(kid=>{
  const div = document.createElement("div");
  div.className = "kid";
  div.innerText = kid;

  div.onclick = ()=>{
    if(selecionados.includes(kid)){
      selecionados = selecionados.filter(k=>k!==kid);
      div.classList.remove("active");
    } else {
      selecionados.push(kid);
      div.classList.add("active");
    }
  };

  document.getElementById("kids").appendChild(div);
});

function confirmarCarona(){
  const data = {
    motorista: motorista.value,
    dia: dia.value,
    tipo: tipo.value,
    destino: destino.value,
    horario: horario.value,
    kids: []
  };

  fetch(URL,{
    method:"POST",
    body: JSON.stringify(data)
  }).then(()=>{
    setTimeout(carregar, 800); // 🔥 melhora atualização
  });
}

function entrarNaCarona(linha){
  if(selecionados.length === 0){
    alert("Seleciona pelo menos 1 piá");
    return;
  }

  fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      ...linha,
      kids: selecionados
    })
  }).then(()=>{
    selecionados = [];
    document.querySelectorAll(".kid").forEach(k=>k.classList.remove("active"));
    setTimeout(carregar, 800);
  });
}

function carregar(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    escola.innerHTML = "";
    futsal.innerHTML = "";

    data.slice().reverse().forEach(l=>{
      if(!l[0]) return;

      const html = `
      <div class="car">
        <b>${l[0]} - <span class="${l[5]=='18h'?'hora18':'hora19'}">${l[5]}</span> - ${l[1]} (${l[3]})</b><br>
        ${l[2]}<br>
        ${l[4] ? l[4].split(", ").map(k=>"→ "+k).join("<br>") : "<i>Nenhuma criança ainda</i>"}<br>
        <button class="btn-entrar" onclick='entrarNaCarona(${JSON.stringify(l)})'>Entrar nessa carona</button>
      </div>`;

      if(l[1]=="Escola") escola.innerHTML += html;
      else futsal.innerHTML += html;
    });
  });
}

function enviarWhats(){
  let texto = "🚐 Barcas do Pedra Bonita\n\n";

  const cards = document.querySelectorAll(".car");

  cards.forEach(c => {
    texto += c.innerText + "\n\n";
  });

  if (texto.trim() === "🚐 Barcas do Pedra Bonita") {
    alert("Nada pra enviar");
    return;
  }

  window.open("https://wa.me/?text=" + encodeURIComponent(texto));
}
carregar();
</script>

</body>
</html>
