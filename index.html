<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcas do Pedra Bonita</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f7;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

h1 { text-align: center; }

.card {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-vaga { background: #34c759; }
.btn-confirmar { background: #ff9500; }
.btn-whats { background: #25d366; }

.kids {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kid {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  cursor: pointer;
}

.kid.active {
  background: #007aff;
  color: white;
}

.car {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}
</style>
</head>

<body>

<h1>⛴️ Barcas do Pedra Bonita</h1>

<div class="card">

<select id="motorista"></select>
<select id="dia"></select>
<select id="tipo"></select>
<select id="destino"></select>

<button class="btn-vaga" onclick="prepararCarona()">🚐 Tenho vaga</button>

<button id="btnConfirmar" class="btn-confirmar" onclick="confirmarCarona()" style="display:none;">
✅ Confirmar carona
</button>

<div class="kids" id="kids"></div>

<button onclick="alert('Escolha a carona abaixo 👇')">➕ Entrar na carona</button>

<button class="btn-whats" onclick="enviarWhats()">📤 Avisar no WhatsApp</button>

</div>

<div class="card">
  <div id="lista">Nenhuma carona ainda</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzv45aDvmAMqew1hyvBb6BhyL9aA3rvn_7rmxGyBCHQYBEpQhij4iyHnoEUMrEkjhIjkw/exec";

let caronaTemp = null;
let selecionados = [];

const motoristas = ["Carmen/João","Denise/Telmo","Karina/Jéferson","Natália/Pedro","Vanessa/Cris"];
const dias = ["Segunda","Terça","Quarta","Quinta","Sexta"];

document.getElementById("motorista").innerHTML = motoristas.map(m=>`<option>${m}</option>`).join("");
document.getElementById("dia").innerHTML = dias.map(d=>`<option>${d}</option>`).join("");
document.getElementById("tipo").innerHTML = `<option value="Levar">Ida</option><option value="Buscar">Volta</option>`;
document.getElementById("destino").innerHTML = `<option>Escola</option><option>Futsal</option>`;

const kidsLista = ["José","João","Joaquim","Beni","Bento","Finkler"];
const kidsDiv = document.getElementById("kids");

kidsLista.forEach(kid=>{
  const div=document.createElement("div");
  div.className="kid";
  div.innerText=kid;

  div.onclick=()=>{
    if(selecionados.includes(kid)){
      selecionados=selecionados.filter(k=>k!==kid);
      div.classList.remove("active");
    } else {
      selecionados.push(kid);
      div.classList.add("active");
    }
  };

  kidsDiv.appendChild(div);
});

function prepararCarona(){
  caronaTemp = {
    motorista: document.getElementById("motorista").value,
    dia: document.getElementById("dia").value,
    tipo: document.getElementById("tipo").value,
    destino: document.getElementById("destino").value
  };

  document.getElementById("btnConfirmar").style.display = "block";
}

function confirmarCarona(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({...caronaTemp, kids:[]})
  }).then(()=>{
    alert("Carona confirmada! 🚐");
    document.getElementById("btnConfirmar").style.display = "none";
    carregar();
  });
}

function entrarNaCarona(c){
  if(selecionados.length===0){
    alert("Seleciona criança");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({...c, kids:selecionados})
  }).then(()=>{
    selecionados=[];
    document.querySelectorAll(".kid").forEach(k=>k.classList.remove("active"));
    carregar();
  });
}

function carregar(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    const lista=document.getElementById("lista");
    lista.innerHTML="";

    let grupos={};

    data.forEach(l=>{
      if(!l[0]) return;
      const key=l[0]+l[1]+l[2]+l[3];

      if(!grupos[key]){
        grupos[key]={dia:l[0],destino:l[1],motorista:l[2],tipo:l[3],kids:[]};
      }

      if(l[4]){
        l[4].split(", ").forEach(k=>{
          if(!grupos[key].kids.includes(k)){
            grupos[key].kids.push(k);
          }
        });
      }
    });

    Object.values(grupos).forEach(c=>{
      let html=`<div class="car">
      <strong>${c.dia} - ${c.destino} (${c.tipo})</strong><br>
      ${c.motorista}<br>`;

      c.kids.forEach(k=> html+=`→ ${k}<br>`);

      html+=`<button onclick='entrarNaCarona(${JSON.stringify(c)})'>Entrar nessa carona</button>`;
      html+="</div>";

      lista.innerHTML+=html;
    });

    if(!lista.innerHTML) lista.innerHTML="Nenhuma carona ainda";
  });
}

function enviarWhats(){
  const lista=document.getElementById("lista").innerText;

  if(lista.includes("Nenhuma")){
    alert("Nada pra enviar");
    return;
  }

  window.open("https://wa.me/?text="+encodeURIComponent(lista));
}

carregar();
</script>

</body>
</html>
